name: pgdekho
description: "A new Flutter project developed by Babu Saheb"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Image & OCR
  image_picker: ^1.0.4
  google_mlkit_text_recognition: ^0.15.1
  flutter_native_ocr: ^0.1.0
  image_cropper: ^11.0.0
  image: ^4.0.17

  # Permissions & Connectivity
  permission_handler: ^12.0.1
  connectivity_plus: ^7.0.0

  # Storage & Utils
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  path: ^1.8.3
  intl: ^0.20.2
  retry: ^3.1.0
  http: ^1.2.2

  # State Management
  flutter_bloc: ^9.1.1

  # Google Maps
#  google_maps_flutter: ^2.9.0
#  google_maps_flutter_web: ^0.5.0
#  flutter_google_places_sdk: ^0.4.3
#  geolocator: ^14.0.2
#  geocoding: ^4.0.0

  # UI Tools
  flutter_quill: ^11.5.0
  flutter_painter_v2: ^2.1.0+1
  loading_animation_widget: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.3.10

flutter:

  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/icon/
    - assets/sounds/

  fonts:

    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito/static/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito/static/Nunito-Bold.ttf

    - family: DM Sans
      fonts:
        - asset: assets/fonts/DM_Sans/static/DMSans-Regular.ttf
        - asset: assets/fonts/DM_Sans/static/DMSans-Bold.ttf

    # - family: Poppins
    #   fonts:
    #     - asset: assets/fonts/Poppins/Poppins-Regular.ttf
    #     - asset: assets/fonts/Poppins/Poppins-Bold.ttf
    #     - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
    #     - asset: assets/fonts/Poppins/Poppins-Medium.ttf
    #     - asset: assets/fonts/Poppins/Poppins-Light.ttf
    #     - asset: assets/fonts/Poppins/Poppins-ExtraBoldItalic.ttf


flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/appIcon.png"
  remove_alpha_ios: true
  background_color: "#FFFFFF"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/appIcon.png

  android_12:
    color: "#FFFFFF"
    image: assets/icon/appIcon.png